<div class="document-page">

    <div class="doc-toolbar">
        <button mat-button routerLink="/docs/dashboard" id="back-btn">
            <mat-icon>arrow_back</mat-icon>
            Back to Search
        </button>
    </div>

    @if (doc.isLoading()) {
        <div class="loading-state">
            <mat-spinner diameter="48"></mat-spinner>
            <p class="mat-body-medium">Loading document…</p>
        </div>
    }

    @if (doc.error()) {
        <div class="error-state">
            <mat-icon color="warn" style="font-size:48px;width:48px;height:48px">error_outline</mat-icon>
            <p id="doc-error" class="mat-body-large">Document not found.</p>
            <button mat-stroked-button routerLink="/docs/dashboard">Go back</button>
        </div>
    }

    @if (doc.value(); as d) {
        <mat-card appearance="outlined" id="doc-detail" class="doc-card">

            <!-- Header row: icon + title + download -->
            <mat-card-header>
                <div mat-card-avatar class="doc-avatar">
                    <mat-icon>description</mat-icon>
                </div>
                <mat-card-title id="doc-title">{{ d.title }}</mat-card-title>
                <mat-card-subtitle id="doc-filename">{{ d.filename }}</mat-card-subtitle>
            </mat-card-header>

            <mat-divider></mat-divider>

            <mat-card-content class="doc-content">
                <!-- Meta chips -->
                <mat-chip-set>
                    <mat-chip id="doc-type">
                        <mat-icon matChipAvatar>insert_drive_file</mat-icon>
                        {{ d.fileType }}
                    </mat-chip>
                    <mat-chip>
                        <mat-icon matChipAvatar>calendar_today</mat-icon>
                        {{ d.createdAt | date:'mediumDate' }}
                    </mat-chip>
                </mat-chip-set>

                <!-- Description -->
                <p id="doc-description" class="doc-description">{{ d.description }}</p>
            </mat-card-content>

            <mat-divider></mat-divider>

            <mat-card-actions align="start">
                <button mat-flat-button color="primary" id="download-btn"
                        [disabled]="downloading()" (click)="onDownload()">
                    @if (downloading()) {
                        <mat-spinner diameter="18"></mat-spinner>
                    } @else {
                        <mat-icon>download</mat-icon>
                    }
                    Download
                </button>
            </mat-card-actions>

        </mat-card>
    }

</div>
