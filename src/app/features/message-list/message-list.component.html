<div class="chat-container">
    <!-- Header -->
    <mat-toolbar class="chat-header">
        <mat-icon class="bot-icon">smart_toy</mat-icon>
        <span class="bot-name">Nexa bot</span>
    </mat-toolbar>

    <!-- Loading older messages -->
    @if (loading()) {
        <div class="load-more-spinner">
            <mat-progress-spinner mode="indeterminate" diameter="24"/>
        </div>
    }

    <!-- Messages -->
    <div class="messages-area" #messagesArea (scroll)="onMessagesScroll($event)">
        <div class="top-sentinel"></div>
        @for (msg of displayMessages(); track msg.sequenceNumber) {
            <app-message [message]="msg"/>
            @if (isSendingMessage(msg) && msg.status === 'error') {
                <div class="error-row">
                    <span class="error-text">Failed to send</span>
                    <button mat-button color="warn" (click)="onRetryErrorMessage()">Retry</button>
                </div>
            }
        }
        <!-- Bot typing / streaming indicator -->
        @if (cancellable()) {
            <div class="bot-typing">
                <mat-progress-spinner mode="indeterminate" diameter="20"/>
                <span class="bot-typing-label">Nexa bot is typing…</span>
            </div>
        }
    </div>

    <!-- Input -->
    <div class="input-area">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="message-input">
      <textarea matInput
                cdkTextareaAutosize
                cdkAutosizeMinRows="1"
                cdkAutosizeMaxRows="4"
                placeholder="Type a message..."
                [value]="message()"
                [disabled]="!!cancellable()"
                (input)="message.set($any($event.target).value)"
                (keydown.enter)="$event.preventDefault(); onSendClicked()"
                id="message-input">
      </textarea>
        </mat-form-field>

        @if (cancellable()) {
            <button mat-icon-button color="warn" (click)="onCancelClicked()" id="cancel-btn"
                    matTooltip="Cancel">
                <mat-icon>cancel</mat-icon>
            </button>
        } @else {
            <button mat-icon-button color="primary" (click)="onSendClicked()" id="send-btn"
                    [disabled]="!message()">
                <mat-icon>send</mat-icon>
            </button>
        }
    </div>
</div>
